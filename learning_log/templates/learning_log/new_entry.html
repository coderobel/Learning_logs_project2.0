{% extends 'learning_log/base.html' %}
{% block content %}
<div  class="card" id="new-entry-card">
    <h3 style="margin-bottom: 13px;">Add a new entry for: <a href="{% url 'learning_log:topic' topic.id%}">{{ topic }}</a></h3>
    <form action="{% url 'learning_log:new_entry' topic.id%}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button name="submit" style="border-radius: 15px; padding: 10px; background-color: black; color: white; margin-left: 250px;">Add Entry</button>
    </form>
</div>
{% endblock content %}

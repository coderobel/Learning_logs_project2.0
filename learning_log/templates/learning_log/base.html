{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Logs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link href="{% static 'learning_log/css/styles.css' %}" rel="stylesheet">
</head>
<body class="body">
  <header>
    <nav>
      <h4><a href="{% url 'learning_log:home' %}" style="margin-left: 30px;">Learning Log</a></h4>
      <h4><a href="{% url 'learning_log:topics' %}" style="margin-right: 659px; margin-left: 20px;">Topics</a></h4>
    {% if user.is_authenticated %}
      <h5 style="margin-right: 20px; color:aliceblue">Hello, {{ user.username }}.</h5>
      <h4><a href="{% url 'users:logout' %}">Logout</a></h4>
    {% else %}
      <h4><a href="{% url 'users:register' %}">Register</a></h4>
      <h4><a href="{% url 'users:login' %}" style="margin-left: 10px;">Login</a></h4>
    {% endif %}
    </nav>
  </header>
{% block content %}{% endblock content %}
</body>
</html>

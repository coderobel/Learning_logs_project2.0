{% extends 'learning_log/base.html' %}
{% block content %}
<div class="card" id="new-topic-card">
    <h3 style="margin-bottom: 23px;">Add a New Topic</h3>
    <form action="{% url 'learning_log:new_topic' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button name="submit" style="border-radius: 15px; padding: 10px; background-color: black; color: white;">Add Topic</button>
    </form>
</div>
{% endblock content %}

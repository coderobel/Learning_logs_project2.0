{% extends 'learning_log/base.html' %}
{% block content %}
<div class="card" id="login-card">
    <h2 style="margin-left: 130px; margin-bottom: 16px;">Login</h2>
    {% if form.errors %}
        <p>Your username and password didn't match. Please try again.</p>
    {% endif %}

    <form method="post" action="{% url 'users:login' %}">
        {% csrf_token %}
        {{ form.as_p }}

        <button name="submit" style="border-radius: 15px; padding: 10px; background-color: black; color: white; margin-left: 140px; width: 100px;">Login</button>
        <input type="hidden" name="next" value="{% url 'learning_log:home' %}" />
    </form>
</div>
{% endblock content %}
